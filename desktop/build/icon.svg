<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Apple Big Sur icon grid: 824x824 body inside 1024x1024 canvas with
       transparent padding. Corner radius ~22.37% of body width matches the
       system squircle used by Linear and other native macOS apps. -->
  <rect x="100" y="100" width="824" height="824" rx="184" ry="184" fill="#10b981"/>

  <!-- White globe lines. Stroke attrs are inlined per-element instead of
       inherited from a <g> wrapper because some SVG renderers (ImageMagick)
       drop group-level stroke inheritance and produce all-black output. -->
  <circle cx="512" cy="512" r="240" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>
  <ellipse cx="512" cy="512" rx="93" ry="240" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>
  <line x1="512" y1="262" x2="512" y2="762" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>
</svg>
