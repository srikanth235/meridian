<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page runtime</title>
    <style>
      :root {
        --bg: #0b0d10;
        --panel: #14181d;
        --panel2: #1a1f25;
        --text: #e6e8eb;
        --textDim: #a3a8af;
        --textMute: #6b7280;
        --border: #262c33;
        --accent: #10b981;
      }
      :root.theme-light {
        --bg: #fafafa;
        --panel: #ffffff;
        --panel2: #f4f5f7;
        --text: #111418;
        --textDim: #4b5160;
        --textMute: #6b7280;
        --border: #e2e5ea;
        --accent: #0ea569;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        height: 100%;
      }
      #root { min-height: 100%; }
      .page-runtime-error {
        padding: 16px;
        margin: 16px;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.4);
        border-radius: 8px;
        color: var(--text);
        font-family: ui-monospace, monospace;
        font-size: 12px;
        white-space: pre-wrap;
      }
      .page-runtime-loading {
        padding: 32px;
        color: var(--textMute);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="page-runtime-loading">page runtime loading…</div>
    </div>
    <script type="module" src="/src/page-runtime/main.tsx"></script>
  </body>
</html>
